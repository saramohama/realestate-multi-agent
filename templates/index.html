<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prestige Realty — AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --dark: #1a1a18;
      --gold: #c9a96e;
      --gold-light: #e8d5b0;
      --muted: #7a7670;
      --bubble-agent: #ffffff;
      --bubble-user: #1a1a18;
    }

    body {
      background: var(--cream);
      color: var(--dark);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 2.5rem;
      border-bottom: 1px solid var(--gold-light);
      background: var(--cream);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .logo-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--dark);
    }

    .logo-tag {
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #6ab87a;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    /* ── CHAT AREA ── */
    .chat-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 0;
      scroll-behavior: smooth;
    }

    .chat-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 3rem 1rem 2rem;
      animation: fadeUp 0.7s ease both;
    }

    .welcome-icon {
      font-size: 2.4rem;
      margin-bottom: 1rem;
      display: block;
    }

    .welcome h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .welcome p {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      line-height: 1.8;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
      margin-top: 1.8rem;
    }

    .suggestion {
      padding: 0.5rem 1rem;
      border: 1px solid var(--gold-light);
      border-radius: 2px;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      font-family: 'DM Mono', monospace;
    }

    .suggestion:hover {
      border-color: var(--gold);
      color: var(--dark);
      background: rgba(201,169,110,0.08);
    }

    /* Messages */
    .msg {
      display: flex;
      gap: 0.9rem;
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-family: 'Cormorant Garamond', serif;
      margin-top: 2px;
    }

    .avatar.agent {
      background: var(--gold);
      color: var(--dark);
      font-weight: 600;
    }

    .avatar.user {
      background: var(--dark);
      color: var(--cream);
    }

    .bubble {
      max-width: 78%;
      padding: 0.9rem 1.2rem;
      border-radius: 2px;
      font-size: 0.75rem;
      line-height: 1.75;
      letter-spacing: 0.03em;
      white-space: pre-wrap;
    }

    .msg.agent .bubble {
      background: var(--bubble-agent);
      border: 1px solid var(--gold-light);
      color: var(--dark);
      border-top-left-radius: 0;
    }

    .msg.user .bubble {
      background: var(--bubble-user);
      color: var(--cream);
      border-top-right-radius: 0;
    }

    /* Typing indicator */
    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 1rem 1.2rem;
    }

    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%           { transform: translateY(-6px); opacity: 1; }
    }

    /* ── INPUT ── */
    .input-area {
      flex-shrink: 0;
      border-top: 1px solid var(--gold-light);
      background: var(--cream);
      padding: 1.2rem 1.5rem 1.4rem;
    }

    .input-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 0.8rem;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: #ffffff;
      border: 1px solid var(--gold-light);
      border-radius: 2px;
      padding: 0.8rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      color: var(--dark);
      resize: none;
      line-height: 1.6;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: var(--gold); }
    textarea::placeholder { color: var(--muted); }

    .send-btn {
      background: var(--dark);
      color: var(--cream);
      border: none;
      border-radius: 2px;
      width: 44px; height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: var(--gold); color: var(--dark); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .send-btn svg { width: 18px; height: 18px; }

    .input-hint {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-top: 0.5rem;
      text-align: center;
    }

    /* scrollbar */
    .chat-wrap::-webkit-scrollbar { width: 4px; }
    .chat-wrap::-webkit-scrollbar-track { background: transparent; }
    .chat-wrap::-webkit-scrollbar-thumb { background: var(--gold-light); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-name">Prestige Realty</span>
    <span class="logo-tag">AI Listing Assistant</span>
  </div>
  <div class="status-pill">
    <span class="status-dot"></span>
    Online
  </div>
</header>

<div class="chat-wrap" id="chatWrap">
  <div class="chat-inner" id="chatInner">
    <div class="welcome" id="welcome">
      <span class="welcome-icon">🏛️</span>
      <h2>Good day. I'm Alex.</h2>
      <p>Your personal real estate assistant.<br/>I can help you list properties, search listings,<br/>schedule viewings, and calculate mortgages.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion(this)">List my property</button>
        <button class="suggestion" onclick="sendSuggestion(this)">Search listings</button>
        <button class="suggestion" onclick="sendSuggestion(this)">Schedule a viewing</button>
        <button class="suggestion" onclick="sendSuggestion(this)">Calculate mortgage</button>
      </div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-inner">
    <textarea id="msgInput" rows="1" placeholder="Type your message…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <p class="input-hint">Press Enter to send · Shift+Enter for new line</p>
</div>

<script>
  const SESSION_ID = 'user-' + Math.random().toString(36).slice(2, 9);
  const API_URL = '/chat';
  let isLoading = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendSuggestion(btn) {
    document.getElementById('msgInput').value = btn.textContent;
    sendMessage();
  }

  function hideWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function appendMsg(role, text) {
    hideWelcome();
    const wrap = document.getElementById('chatInner');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="avatar ${role}">${role === 'agent' ? 'A' : 'Y'}</div>
      <div class="bubble">${escHtml(text)}</div>
    `;
    wrap.appendChild(div);
    scrollBottom();
    return div;
  }

  function showTyping() {
    hideWelcome();
    const wrap = document.getElementById('chatInner');
    const div = document.createElement('div');
    div.className = 'msg agent typing';
    div.id = 'typingIndicator';
    div.innerHTML = `
      <div class="avatar agent">A</div>
      <div class="bubble">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    `;
    wrap.appendChild(div);
    scrollBottom();
  }

  function hideTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  function scrollBottom() {
    const w = document.getElementById('chatWrap');
    w.scrollTop = w.scrollHeight;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>');
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    appendMsg('user', text);
    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: SESSION_ID, message: text })
      });
      const data = await res.json();
      hideTyping();
      appendMsg('agent', data.reply || 'Sorry, I could not process that.');
    } catch (err) {
      hideTyping();
      appendMsg('agent', 'Connection error. Please try again.');
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('msgInput').focus();
  }
</script>
</body>
</html>
